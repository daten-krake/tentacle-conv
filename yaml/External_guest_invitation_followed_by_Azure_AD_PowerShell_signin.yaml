id: ""
name: External_guest_invitation_followed_by_Azure_AD_PowerShell_signin
severity: Medium
fp_rate: ""
permission_required: ""
mitre:
    - tactics:
        - InitialAccess
        - Persistence
      techniques:
        - T1078
        - T1136
entity_mapping:
    - entity_type: Account
      field_mapping:
        - identifier: FullName
          column_name: InvitedUser
        - identifier: Name
          column_name: InvitedUserName
        - identifier: UPNSuffix
          column_name: InvitedUserUPNSuffix
    - entity_type: Account
      field_mapping:
        - identifier: FullName
          column_name: InitiatingUserPrincipalName
        - identifier: Name
          column_name: InitiatedByName
        - identifier: UPNSuffix
          column_name: InitiatedByUPNSuffix
    - entity_type: Account
      field_mapping:
        - identifier: AadUserId
          column_name: InitiatingAadUserId
    - entity_type: Account
      field_mapping:
        - identifier: AadUserId
          column_name: InitiatingAppServicePrincipalId
    - entity_type: IP
      field_mapping:
        - identifier: Address
