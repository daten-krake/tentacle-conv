name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${pair%/*}
            GOARCH=${pair#*/}
            BINARY="tentacle-conv"
            [ "$GOOS" = "windows" ] && BINARY="${BINARY}.exe"
            echo "Building $GOOS/$GOARCH ..."
            GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/${BINARY}" ./cmd/tentacle-conv
            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip "tentacle-conv_${VERSION}_${GOOS}_${GOARCH}.zip" "${BINARY}" && rm "${BINARY}")
            else
              (cd dist && tar czf "tentacle-conv_${VERSION}_${GOOS}_${GOARCH}.tar.gz" "${BINARY}" && rm "${BINARY}")
            fi
          done
          (cd dist && sha256sum tentacle-conv_* > "tentacle-conv_${VERSION}_checksums.txt")

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
