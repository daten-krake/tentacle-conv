name: Convert ARM Templates to YAML

on:
  push:
    paths:
      - "arm/**"
      - "scripts/sync_arm_to_yaml.py"
      - ".github/workflows/arm-to-yaml.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build tentacle-conv
        run: go build -o tentacle-conv ./cmd/tentacle-conv

      - name: Ensure yaml output directory exists
        run: mkdir -p yaml

      - name: Run ARM to YAML sync
        run: |
          set -euo pipefail
          python3 scripts/sync_arm_to_yaml.py

      - name: Commit converted YAML files and manifests
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yaml/
          git add arm/*.manifest || true
          git add arm/**/*.manifest || true
          if git diff --cached --quiet; then
            echo "No YAML changes to commit"
          else
            git commit -m "auto: convert ARM templates to YAML [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
