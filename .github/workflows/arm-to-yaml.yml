name: Convert ARM Templates to YAML

on:
  push:
    paths:
      - "arm/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new ARM files
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          collect_all_files() {
            files=()
            if [ -d "arm/" ]; then
              while IFS= read -r -d '' f; do
                files+=("$f")
              done < <(find arm/ -type f -name '*.json' -print0 | sort -z)
            fi
          }

          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "Manual trigger: processing all ARM JSON files" >&2
            collect_all_files
          else
            if [ -z "$EVENT_BEFORE" ] || [ "$EVENT_BEFORE" == "0000000000000000000000000000000000000000" ]; then
              echo "First push or null before SHA. Processing all ARM JSON files." >&2
              collect_all_files
            elif ! git rev-parse --quiet --verify "$EVENT_BEFORE^{commit}" >/dev/null 2>&1; then
              echo "Before commit $EVENT_BEFORE not available. Processing all ARM JSON files." >&2
              collect_all_files
            else
              files=()
              while IFS= read -r -d '' status && IFS= read -r -d '' filename; do
                if [ "$status" == "A" ]; then
                  files+=("$filename")
                fi
              done < <(git diff -z --name-status --diff-filter=A "$EVENT_BEFORE" "$EVENT_SHA" -- arm/)
            fi
          fi

          json="[]"
          if [ ${#files[@]} -gt 0 ]; then
            json=$(printf '%s\n' "${files[@]}" | jq -R 'select(length > 0)' | jq -s . | tr -d '\n')
          fi

          if [ "$json" == "[]" ]; then
            echo "has_new_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_files=true" >> "$GITHUB_OUTPUT"
          fi
          echo "added_files=$json" >> "$GITHUB_OUTPUT"
          echo "Files to process: $json" >&2

      - name: Setup Go
        if: steps.detect.outputs.has_new_files == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build tentacle-conv
        if: steps.detect.outputs.has_new_files == 'true'
        run: go build -o tentacle-conv ./cmd/tentacle-conv

      - name: Ensure yaml output directory exists
        if: steps.detect.outputs.has_new_files == 'true'
        run: mkdir -p yaml

      - name: Convert ARM templates to YAML
        if: steps.detect.outputs.has_new_files == 'true'
        env:
          FILES_JSON: ${{ steps.detect.outputs.added_files }}
        shell: bash
        run: |
          set -euo pipefail
          readarray -t files < <(echo "$FILES_JSON" | jq -r '.[]')
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "Converting $file"
              ./tentacle-conv -mode yaml -array -file "$file" -outpath yaml/
            else
              echo "Warning: file '$file' not found, skipping." >&2
            fi
          done

      - name: Commit converted YAML files
        if: steps.detect.outputs.has_new_files == 'true'
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yaml/
          if git diff --cached --quiet; then
            echo "No YAML changes to commit"
          else
            git commit -m "auto: convert ARM templates to YAML [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
